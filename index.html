<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0010">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="劲乐团">
<link rel="apple-touch-icon" href="/JingYueTuanOnWeb/apple-touch-icon.png">
<title>劲乐团 - Rhythm Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0010;
  color: #fff;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
  user-select: none;
}

#screen-start, #screen-game, #screen-result {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── START SCREEN ── */
#screen-start {
  background: radial-gradient(ellipse at center, #1a003a 0%, #0a0010 80%);
  z-index: 10;
}

.title {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #ff00cc, #ffcc00, #00ffcc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  margin-bottom: 8px;
  animation: pulse-title 2s ease-in-out infinite;
}

@keyframes pulse-title {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.4); }
}

.subtitle {
  color: #aa88cc;
  font-size: 16px;
  letter-spacing: 3px;
  margin-bottom: 48px;
}

.upload-area {
  width: 420px;
  padding: 32px;
  border: 2px dashed #6633aa;
  border-radius: 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(102, 51, 170, 0.1);
  margin-bottom: 24px;
}

.upload-area:hover, .upload-area.drag-over {
  border-color: #cc66ff;
  background: rgba(102, 51, 170, 0.25);
  transform: scale(1.02);
}

.upload-icon { font-size: 48px; margin-bottom: 12px; }
.upload-text { color: #cc99ee; font-size: 16px; margin-bottom: 6px; }
.upload-hint { color: #664488; font-size: 12px; }

#file-input { display: none; }

.file-info {
  background: rgba(0, 255, 136, 0.1);
  border: 1px solid #00ff88;
  border-radius: 10px;
  padding: 12px 24px;
  margin-bottom: 24px;
  font-size: 14px;
  color: #00ff88;
  display: none;
  max-width: 420px;
  text-align: center;
  word-break: break-all;
}

.start-btn {
  padding: 16px 64px;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 4px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  background: linear-gradient(135deg, #cc00ff, #ff6600);
  color: #fff;
  transition: all 0.3s;
  box-shadow: 0 0 30px rgba(204, 0, 255, 0.5);
  display: none;
}

.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 50px rgba(204, 0, 255, 0.8);
}

.start-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.analyze-progress {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.progress-bar {
  width: 300px;
  height: 6px;
  background: #2a1040;
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #cc00ff, #ff6600);
  border-radius: 3px;
  transition: width 0.2s;
  width: 0%;
}

.progress-text { color: #aa88cc; font-size: 13px; }

/* difficulty picker */
#difficulty-picker {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

#difficulty-picker .label {
  color: #aa88cc;
  font-size: 13px;
  letter-spacing: 2px;
}

#difficulty-hint {
  color: #664488;
  font-size: 11px;
  letter-spacing: 1px;
}

.diff-btn {
  padding: 10px 28px;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 2px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.25s;
  border: 2px solid;
  background: transparent;
}
.diff-btn.easy   { border-color: #00ff88; color: #00ff88; }
.diff-btn.normal { border-color: #00c8ff; color: #00c8ff; }
.diff-btn.hard   { border-color: #ff3264; color: #ff3264; }
.diff-btn.selected { color: #000 !important; }
.diff-btn.easy.selected   { background: #00ff88; }
.diff-btn.normal.selected { background: #00c8ff; }
.diff-btn.hard.selected   { background: #ff3264; }

/* key guide */
.key-guide {
  display: flex;
  gap: 8px;
  margin-top: 32px;
  align-items: center;
}

.key-col { display: flex; flex-direction: column; gap: 6px; align-items: center; }

.key-btn {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 15px;
  border: 2px solid;
}

.key-space {
  width: 100px;
  height: 42px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 11px;
  border: 2px solid;
  letter-spacing: 1px;
}

.key-label { font-size: 10px; color: #886699; margin-top: 2px; }

.col-a .key-btn { background: rgba(255,50,100,0.15); border-color: #ff3264; color: #ff3264; }
.col-s .key-btn { background: rgba(255,150,0,0.15); border-color: #ff9900; color: #ff9900; }
.col-d .key-btn { background: rgba(255,255,0,0.15); border-color: #ffff00; color: #ffff00; }
.col-sp .key-space { background: rgba(0,255,136,0.15); border-color: #00ff88; color: #00ff88; }
.col-j .key-btn { background: rgba(0,200,255,0.15); border-color: #00c8ff; color: #00c8ff; }
.col-k .key-btn { background: rgba(100,50,255,0.15); border-color: #6432ff; color: #6432ff; }
.col-l .key-btn { background: rgba(255,0,200,0.15); border-color: #ff00c8; color: #ff00c8; }

/* ── GAME SCREEN ── */
#screen-game {
  display: none;
  flex-direction: row;
  align-items: stretch;
  justify-content: center;
  background: #0a0010;
}

#game-canvas {
  display: block;
  flex-shrink: 0;
}

/* ── RESULT SCREEN ── */
#screen-result {
  display: none;
  background: radial-gradient(ellipse at center, #1a003a 0%, #0a0010 80%);
  z-index: 10;
  gap: 16px;
}

.result-title {
  font-size: 48px;
  font-weight: 900;
  background: linear-gradient(135deg, #ff00cc, #ffcc00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.result-score { font-size: 72px; font-weight: 900; color: #ffcc00; }
.result-stats { color: #aa88cc; font-size: 16px; line-height: 1.8; text-align: center; }

.result-grade {
  font-size: 96px;
  font-weight: 900;
  line-height: 1;
}

.grade-s { color: #ffcc00; text-shadow: 0 0 40px #ffcc00; }
.grade-a { color: #00ff88; text-shadow: 0 0 40px #00ff88; }
.grade-b { color: #00c8ff; text-shadow: 0 0 40px #00c8ff; }
.grade-c { color: #cc66ff; text-shadow: 0 0 40px #cc66ff; }
.grade-d { color: #ff6666; text-shadow: 0 0 40px #ff6666; }

.btn-row { display: flex; gap: 16px; margin-top: 16px; }

.btn-secondary {
  padding: 12px 32px;
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 2px;
  border: 2px solid #6633aa;
  border-radius: 50px;
  cursor: pointer;
  background: transparent;
  color: #cc99ee;
  transition: all 0.3s;
}

.btn-secondary:hover {
  border-color: #cc66ff;
  color: #fff;
  background: rgba(102,51,170,0.3);
}

/* ── HUD overlay ── */
#hud {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  z-index: 5;
  pointer-events: none;
}

#hud-score {
  font-size: 28px;
  font-weight: 900;
  color: #ffcc00;
  text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
}

#hud-combo {
  font-size: 16px;
  color: #ff66cc;
  opacity: 0;
  transition: opacity 0.3s;
}

#hud-song {
  font-size: 12px;
  color: #664488;
  letter-spacing: 1px;
  max-width: 400px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start">
  <div class="title">劲乐团</div>
  <div class="subtitle">RHYTHM MASTER</div>

  <div class="upload-area" id="upload-area">
    <div class="upload-icon">🎵</div>
    <div class="upload-text">拖拽 MP3 到这里，或点击选择</div>
    <div class="upload-hint">支持 .mp3 / .ogg / .wav 文件</div>
    <input type="file" id="file-input" accept=".mp3,.ogg,.wav,audio/*">
  </div>

  <div class="file-info" id="file-info"></div>

  <div class="analyze-progress" id="analyze-progress">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">分析音乐中...</div>
  </div>

  <div id="difficulty-picker">
    <div class="label">SELECT DIFFICULTY</div>
    <div id="difficulty-btns" style="display:flex;gap:10px;"></div>
    <div id="difficulty-hint"></div>
  </div>

  <button class="start-btn" id="start-btn">PLAY</button>

  <div class="key-guide">
    <div class="key-col col-a">
      <div class="key-btn">A</div>
      <div class="key-label">低音1</div>
    </div>
    <div class="key-col col-s">
      <div class="key-btn">S</div>
      <div class="key-label">低音2</div>
    </div>
    <div class="key-col col-d">
      <div class="key-btn">D</div>
      <div class="key-label">低音3</div>
    </div>
    <div class="key-col col-sp">
      <div class="key-space">SPACE</div>
      <div class="key-label">中音</div>
    </div>
    <div class="key-col col-j">
      <div class="key-btn">J</div>
      <div class="key-label">高音1</div>
    </div>
    <div class="key-col col-k">
      <div class="key-btn">K</div>
      <div class="key-label">高音2</div>
    </div>
    <div class="key-col col-l">
      <div class="key-btn">L</div>
      <div class="key-label">高音3</div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game">
  <canvas id="game-canvas"></canvas>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-score">0</div>
  <div id="hud-combo" id="hud-combo"></div>
  <div id="hud-song" id="hud-song"></div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result">
  <div class="result-title">RESULT</div>
  <div class="result-grade" id="result-grade">S</div>
  <div class="result-score" id="result-score">0</div>
  <div class="result-stats" id="result-stats"></div>
  <div class="btn-row">
    <button class="btn-secondary" id="btn-retry">再来一次</button>
    <button class="btn-secondary" id="btn-new">换首歌</button>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
